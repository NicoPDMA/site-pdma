<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Portail PDMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: { extend: { colors: { 'pdma-cyan': '#33C3C3', 'pdma-orange': '#F19A2A' } } }
        }
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white rounded-[3rem] shadow-2xl p-12 text-center border border-gray-100">
        <img src="1.PDMA by MDEF Logo blanc à utiliser.jpg" alt="Logo" class="h-16 mx-auto mb-8">
        
        <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight mb-2">Accès Réservé</h2>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-10">Partenaires PDMA</p>

        <form id="loginForm" class="space-y-6">
            <div class="relative">
                <input type="password" id="password" placeholder="Mot de passe" 
                    class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-pdma-cyan outline-none font-bold text-center transition-all">
            </div>
            
            <p id="errorMsg" class="text-red-500 text-[10px] font-black uppercase hidden">Mot de passe incorrect</p>

            <button type="submit" 
                class="w-full bg-pdma-cyan text-white font-black py-4 rounded-2xl shadow-lg hover:bg-pdma-orange transition-all uppercase tracking-widest text-sm">
                Se connecter
            </button>
        </form>
    </div>

    <script>
        const PASS_OK = "PDMA2026"; // <--- CHANGE TON MOT DE PASSE ICI

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('password').value;
            
            if(input === PASS_OK) {
                // On enregistre dans le navigateur que l'accès est autorisé
                sessionStorage.setItem('access_granted', 'true');
                window.location.href = "index.html";
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
