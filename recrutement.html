<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidats - Espace Adhérent PDMA</title>
    <script>
        if (sessionStorage.getItem('access_granted') !== 'true') { window.location.href = "login.html"; }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'pdma-cyan': '#33C3C3', 'pdma-orange': '#F19A2A', 'pdma-light': '#F8FAFC' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-pdma-light text-slate-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="Nouveau%20dossier/1.PDMA%20by%20MDEF%20Logo%20blanc%20à%20utiliser.jpg" alt="Logo PDMA" class="h-12 w-auto mr-4">
                <div class="hidden lg:block border-l pl-4 border-gray-200 uppercase font-black text-[10px]">
                    <span class="text-slate-400 block">Plateforme des Métiers</span>
                    <span class="text-pdma-cyan block">de l'Autonomie</span>
                </div>
            </a>
            <div class="hidden md:flex space-x-6 text-[11px] font-black uppercase tracking-widest text-slate-600">
                <a href="index.html" class="hover:text-pdma-cyan transition">Accueil</a>
                <a href="documents.html" class="hover:text-pdma-cyan transition">Documents</a>
                <a href="elearning.html" class="hover:text-pdma-cyan transition">Mémos</a>
                <a href="recrutement.html" class="text-pdma-cyan">Candidats</a>
            </div>
        </div>
    </nav>

    <header class="py-12 text-center bg-white">
        <h2 class="text-3xl font-black text-slate-900 uppercase italic">Base de données <span class="text-pdma-cyan text-4xl">Candidats</span></h2>
    </header>

    <main class="container mx-auto px-6 py-8 flex-grow">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-10 border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <div>
                    <label class="block text-[9px] font-black text-slate-400 mb-1 uppercase italic">Poste</label>
                    <select id="f-poste" onchange="filterData()" class="w-full text-[10px] p-3 border-2 border-slate-50 rounded-xl bg-slate-50 font-bold outline-none">
                        <option value="">Tous les postes</option>
                        <option value="Auxiliaire de vie">Auxiliaire de vie</option>
                        <option value="Aide ménager">Aide ménager(ère)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 mb-1 uppercase italic">Expérience</label>
                    <select id="f-exp" onchange="filterData()" class="w-full text-[10px] p-3 border-2 border-slate-50 rounded-xl bg-slate-50 font-bold outline-none">
                        <option value="">Toutes</option>
                        <option value="Débutant">Débutant</option>
                        <option value="1 à 3 ans">1 à 3 ans</option>
                        <option value="3 ans et +">3 ans et +</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 mb-1 uppercase italic">Secteur</label>
                    <input type="text" id="f-geo" onkeyup="filterData()" placeholder="Ville..." class="w-full text-[10px] p-3 border-2 border-slate-50 rounded-xl bg-slate-50 font-bold outline-none">
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 mb-1 uppercase italic">Mobilité</label>
                    <select id="f-mob" onchange="filterData()" class="w-full text-[10px] p-3 border-2 border-slate-50 rounded-xl bg-slate-50 font-bold outline-none">
                        <option value="">Toutes</option>
                        <option value="Véhiculé">Véhiculé(e)</option>
                        <option value="Non véhiculé">Non véhiculé(e)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 mb-1 uppercase italic">Diplôme</label>
                    <select id="f-dip" onchange="filterData()" class="w-full text-[10px] p-3 border-2 border-slate-50 rounded-xl bg-slate-50 font-bold outline-none">
                        <option value="">Indifférent</option>
                        <option value="oui">Diplômé(e) ✅</option>
                        <option value="non">Non diplômé(e) ❌</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="resetFilters()" class="w-full text-[9px] font-black text-pdma-orange border-2 border-pdma-orange py-3 rounded-xl uppercase hover:bg-pdma-orange hover:text-white transition">Reset</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-slate-900 text-white uppercase text-[13px] font-black italic tracking-wider">
                <tr>
                    <th class="p-6 border-r border-slate-800">Réf / Poste</th>
                    <th class="p-6 border-r border-slate-800">Expérience</th>
                    <th class="p-6 border-r border-slate-800">Secteur</th>
                    <th class="p-6 border-r border-slate-800">Mobilité</th>
                    <th class="p-6 border-r border-slate-800 text-center">Diplôme</th>
                    <th class="p-6 text-center">Action</th>
                </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-50 text-xs font-bold text-slate-700 italic">
                </tbody>
        </table>
    </div>
    <div id="counter" class="bg-slate-50 p-4 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest italic border-t border-gray-100">
        Chargement des profils...
    </div>
</div>
    </main>

    <div id="contactModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] shadow-2xl p-10 relative text-center">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-slate-300 hover:text-pdma-orange transition"><i class="fas fa-times text-xl"></i></button>
            <div class="mb-8">
                <h3 class="text-xl font-black text-slate-900 uppercase">Demander le CV</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Réf: <span id="displayID" class="text-pdma-orange">---</span></p>
            </div>
            <form id="reportingForm" class="space-y-4">
                <input type="hidden" id="candidatID">
                <input type="text" id="nom" placeholder="Votre Nom" required class="w-full px-5 py-3 bg-slate-50 border-2 border-transparent rounded-xl focus:border-pdma-cyan outline-none font-bold text-sm">
                <input type="text" id="prenom" placeholder="Votre Prénom" required class="w-full px-5 py-3 bg-slate-50 border-2 border-transparent rounded-xl focus:border-pdma-cyan outline-none font-bold text-sm">
                <input type="text" id="societe" placeholder="Votre Structure" required class="w-full px-5 py-3 bg-slate-50 border-2 border-transparent rounded-xl focus:border-pdma-cyan outline-none font-bold text-sm">
                <input type="email" id="email" placeholder="Votre Email" required class="w-full px-5 py-3 bg-slate-50 border-2 border-transparent rounded-xl focus:border-pdma-cyan outline-none font-bold text-sm">
                <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-pdma-cyan transition-all uppercase tracking-widest text-[11px] mt-4 italic">Valider la demande</button>
            </form>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2pfvmwODHnXVkAXPEVTvqGbF64_b91QxXl1g0zfAScFqftWNgu8xfxB7zfqn-hfAw6KtMvZOcxlj2/pub?output=csv";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWJzO8fZ7wZ_u9-YoNobAI2Aqz5QHRckbZqNKCIoEUhMuCIlNI4OrfUlU0-fGtcMIjnA/exec";

        let candidats = [];

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                candidats = rows.map(row => {
                    const cols = row.split(/[;,]/);
                    return { id: cols[0]?.trim(), poste: cols[1]?.trim(), exp: cols[2]?.trim(), geo: cols[3]?.trim(), dispo: cols[4]?.trim(), mob: cols[5]?.trim(), dip: cols[6]?.trim()?.toLowerCase() };
                }).filter(c => c.poste);
                renderTable(candidats);
            } catch (e) { document.getElementById('counter').innerText = "Erreur de chargement."; }
        }

        function renderTable(data) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            document.getElementById('counter').innerText = `${data.length} CANDIDAT(S) RÉPERTORIÉ(S)`;
            data.forEach(c => {
                tableBody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-pdma-light transition">
                        <td class="p-6"><span class="text-slate-400 text-[9px] block uppercase font-black">RÉF: ${c.id}</span><span class="text-slate-900 font-black uppercase text-[13px]">${c.poste}</span></td>
                        <td class="p-6 text-slate-500">${c.exp}</td>
                        <td class="p-6 text-slate-500">${c.geo}</td>
                        <td class="p-6"><span class="bg-slate-100 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">${c.mob}</span></td>
                        <td class="p-6 text-center text-xl">${c.dip === 'oui' ? '✅' : '❌'}</td>
                        <td class="p-6 text-center"><button onclick="openModal('${c.id}')" class="bg-pdma-cyan text-white text-[9px] font-black px-5 py-3 rounded-xl hover:bg-pdma-orange transition uppercase shadow-md">Contacter</button></td>
                    </tr>`);
            });
        }

        function filterData() {
            const fP = document.getElementById('f-poste').value.toLowerCase();
            const fE = document.getElementById('f-exp').value.toLowerCase();
            const fG = document.getElementById('f-geo').value.toLowerCase();
            const fM = document.getElementById('f-mob').value.toLowerCase();
            const fD = document.getElementById('f-dip').value;
            const filtered = candidats.filter(c => {
                return (fP === "" || c.poste.toLowerCase().includes(fP)) &&
                        (fE === "" || c.exp.toLowerCase().includes(fE)) &&
                        (fG === "" || c.geo.toLowerCase().includes(fG)) &&
                        (fM === "" || c.mob.toLowerCase().includes(fM)) &&
                        (fD === "" || c.dip === fD);
            });
            renderTable(filtered);
        }

        function resetFilters() {
            document.getElementById('f-poste').value = "";
            document.getElementById('f-exp').value = "";
            document.getElementById('f-geo').value = "";
            document.getElementById('f-mob').value = "";
            document.getElementById('f-dip').value = "";
            renderTable(candidats);
        }

        function openModal(id) { document.getElementById('candidatID').value = id; document.getElementById('displayID').innerText = id; document.getElementById('contactModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('contactModal').classList.add('hidden'); document.getElementById('reportingForm').reset(); }

        document.getElementById('reportingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Envoi en cours...";
            btn.disabled = true;

            const payload = {
                idCandidat: document.getElementById('candidatID').value,
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                societe: document.getElementById('societe').value,
                email: document.getElementById('email').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Votre demande a bien été transmise à la PDMA. Nous vous enverrons le CV par mail.");
                closeModal();
                btn.innerText = "Valider la demande";
                btn.disabled = false;
            }).catch(() => {
                alert("Erreur de connexion.");
                btn.disabled = false;
            });
        });

        loadData();
    </script>
</body>
</html>
